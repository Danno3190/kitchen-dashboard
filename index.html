<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    body {
      background-color: #d3d3d3; /* Light grey background */
      color: white;  /* White text for better contrast */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    #heading {
      text-align: center;
      margin-bottom: 20px;
      color: black; /* Header color */
    }

    #dateTime {
      font-size: 18px;
      margin-top: 10px;
    }

    /* Grid for layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    /* Calendar CSS */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }

  </style>
</head>
<body>

  <!-- Heading Section -->
  <div id="heading">
    <h1>The Grey's Kitchen</h1>
    <h2 id="dateTime"></h2>
  </div>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather in Gateshead</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <script>
    // Fetch and display calendar events
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ"; // Example calendar URL

    async function fetchCalendar() {
      try {
        const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
        const data = await response.text();

        // Parse the calendar data into events
        const events = data.split("BEGIN:VEVENT");
        const list = document.getElementById("calendar");
        list.innerHTML = ''; // Clear existing content

        // Check if events exist
        if (events.length <= 1) {
          list.innerHTML = "<li>No upcoming events found.</li>";
          return;
        }

        let count = 0;
        const today = new Date();
        const currentDate = today.toISOString().split("T")[0];  // Get today's date in YYYY-MM-DD format

        // Loop through events and display them
        events.forEach(event => {
          const title = event.match(/SUMMARY:(.*)/);
          const date = event.match(/DTSTART[^:]*:(.*)/);

          if (!title || !date) return;

          const rawDate = date[1].trim();
          const year = rawDate.substring(0, 4);
          const month = rawDate.substring(4, 6);
          const day = rawDate.substring(6, 8);
          const eventDate = `${year}-${month}-${day}`;

          if (eventDate >= currentDate) { // Only show future events
            const item = document.createElement("li");
            item.textContent = `${eventDate.split("-")[2]}/${eventDate.split("-")[1]} - ${title[1]}`;
            list.appendChild(item);
            count++;
          }
        });

        if (count === 0) {
          list.innerHTML = "<li>No upcoming events found.</li>";
        }
      } catch (error) {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events due to an error.</li>";
      }
    }

    fetchCalendar();  // Fetch calendar data on page load

    // Weather Data Fetching using OpenWeatherMap API
    const apiKey = "4ec41d838017d2a6134282b6ff58ad42"; // Replace with your OpenWeatherMap API Key
    const city = "Gateshead"; // Replace with your city
    const units = "metric"; // Celsius

    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=${units}&appid=${apiKey}`)
      .then(response => response.json())
      .then(data => {
        const temp = Math.round(data.main.temp);  // Round the temperature
        const weatherDesc = data.weather[0].description;  // Weather description
        document.getElementById("weatherTemp").textContent = `${temp}°C`;
        document.getElementById("weatherDesc").textContent = weatherDesc;
      })
      .catch(error => {
        console.error("Error fetching weather data:", error);
        document.getElementById("weatherTemp").textContent = "Weather not available";
        document.getElementById("weatherDesc").textContent = "";
      });

  </script>

</body>
</html>
