<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Add your styling here */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    .todayMeal {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 6px;
      border-radius: 10px;
    }

    .weather {
      font-size: 24px;
    }

    .item {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Main content -->
  <div class="grid">

    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Tacos</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Curry</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Stir Fry</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Takeaway</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Roast</div>
      </div>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp" class="weather"></div>
      <div id="weatherDesc" class="item"></div>
    </div>

  </div>

  <!-- Scripts -->
  <script>
    // Calendar
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";
    
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
    .then(response => response.text())
    .then(data => {
      const events = data.split("BEGIN:VEVENT");
      const list = document.getElementById("calendar");

      events.forEach(event => {
        let title = event.match(/SUMMARY:(.*)/);
        let date = event.match(/DTSTART[^:]*:(.*)/);

        if (!title || !date) return;

        const raw = date[1].trim();
        const year = raw.substring(0, 4);
        const month = raw.substring(4, 6);
        const day = raw.substring(6, 8);

        const eventDate = new Date(year, month - 1, day);

        const item = document.createElement("li");
        item.textContent = `${day}/${month} - ${title[1]}`;
        list.appendChild(item);
      });
    });

    // Shopping List
    let shoppingList = JSON.parse(localStorage.getItem("shopping")) || ["Milk", "Eggs", "Bread"];

    function renderShoppingList() {
      const list = document.getElementById("shoppingList");
      list.innerHTML = '';
      shoppingList.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
    }

    function addShoppingItem() {
      const newItem = document.getElementById("newShoppingItem").value;
      if (newItem) {
        shoppingList.push(newItem);
        localStorage.setItem("shopping", JSON.stringify(shoppingList));
        renderShoppingList();
        document.getElementById("newShoppingItem").value = "";
      }
    }

    renderShoppingList();

    // Meal Plan
    const today = new Date().getDay();
    document.querySelectorAll(".meal").forEach(meal => {
      if (parseInt(meal.dataset.day) === today) {
        meal.classList.add("todayMeal");
      }
    });

    // Weather
    fetch("https://wttr.in/?format=j1")
    .then(r => r.json())
    .then(data => {
      document.getElementById("weatherTemp").textContent = `${data.current_condition[0].temp_C}°C`;
      document.getElementById("weatherDesc").textContent = data.current_condition[0].weatherDesc[0].value;
    });

  </script>
</body>
</html>
