<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
font-family:-apple-system, Arial;
color:white;
background:url("https://images.unsplash.com/photo-1504754524776-8f4f37790ca0") center/cover;
}

.overlay{
background:rgba(0,0,0,0.55);
height:100vh;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:30px;
}

.card{
background:rgba(0,0,0,0.5);
padding:25px;
border-radius:20px;
}

h2{
font-size:40px;
margin-top:0;
}

.item{
font-size:30px;
margin:10px 0;
}

.weather{
font-size:50px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="grid">

<div class="card">
<h2>Calendar</h2>

<iframe
src="https://icscalendar.com/embed?url=https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ"
style="border:0;width:100%;height:350px;">
</iframe>

</div>

<div class="card">
<h2>Shopping</h2>

<div class="item">□ Milk</div>
<div class="item">□ Eggs</div>
<div class="item">□ Bread</div>

</div>

<div class="card">
<h2>Meal Plan</h2>

<div class="item">Mon – Pasta</div>
<div class="item">Tue – Tacos</div>
<div class="item">Wed – Curry</div>

</div>

<div class="card">
<h2>Weather</h2>

<div class="weather">☀️ 16°C</div>
<div class="item">Partly cloudy</div>

</div>

</div>

</div>

</body>
</html>
