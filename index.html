<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
font-family: Arial;
background:#111;
color:white;
overflow:hidden;
}

.container{
display:flex;
width:300%;
height:100vh;
scroll-snap-type:x mandatory;
overflow-x:scroll;
}

.card{
flex:0 0 100%;
padding:40px;
scroll-snap-align:start;
}

h1{
font-size:50px;
margin-bottom:30px;
}

.item{
font-size:36px;
margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Calendar</h1>
<div class="item">09:00 School Run</div>
<div class="item">13:00 Dentist</div>
<div class="item">18:00 Football</div>
</div>

<div class="card">
<h1>Shopping List</h1>
<div class="item">□ Milk</div>
<div class="item">□ Eggs</div>
<div class="item">□ Bread</div>
</div>

<div class="card">
<h1>Meal Plan</h1>
<div class="item">Mon – Pasta</div>
<div class="item">Tue – Tacos</div>
<div class="item">Wed – Curry</div>
</div>

</div>

</body>
</html>
