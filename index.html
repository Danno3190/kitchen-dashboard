<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Add your styling here */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    .todayMeal {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 6px;
      border-radius: 10px;
    }

    .weather {
      font-size: 24px;
    }

    .item {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Main content -->
  <div class="grid">

    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Tacos</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Curry</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Stir Fry</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Takeaway</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Roast</div>
      </div>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp" class="weather"></div>
      <div id="weatherDesc" class="item"></div>
    </div>

  </div>

  <script>
const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ"; // Replace with your actual iCloud calendar URL

fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
.then(response => response.text())
.then(data => {
  const events = data.split("BEGIN:VEVENT");
  const list = document.getElementById("calendar");

  events.forEach(event => {
    let title = event.match(/SUMMARY:(.*)/);
    let date = event.match(/DTSTART[^:]*:(.*)/);

    if (!title || !date) return;

    const raw = date[1].trim();
    const year = raw.substring(0, 4);
    const month = raw.substring(4, 6);
    const day = raw.substring(6, 8);

    const eventDate = new Date(year, month - 1, day);

    const item = document.createElement("li");
    item.textContent = `${day}/${month} - ${title[1]}`;
    list.appendChild(item);
  });
})
.catch(error => console.error("Error fetching calendar events: ", error));
<script>
// Load shopping list from localStorage
let shoppingList = JSON.parse(localStorage.getItem("shoppingList")) || [];

function renderShoppingList() {
  const list = document.getElementById("shoppingList");
  list.innerHTML = ''; // Clear the list

  shoppingList.forEach((item, index) => {
    const li = document.createElement("li");

    // Mark as checked or unchecked
    li.innerHTML = `<input type="checkbox" ${item.done ? "checked" : ""} onclick="toggleItem(${index})"> ${item.name} 
    <button onclick="deleteItem(${index})" style="margin-left: 10px; background-color: red; color: white;">❌</button>`;
    list.appendChild(li);
  });

  // Save the shopping list to localStorage
  localStorage.setItem("shoppingList", JSON.stringify(shoppingList));
}

function addShoppingItem() {
  const newItem = document.getElementById("newShoppingItem").value;

  if (newItem.trim()) {
    shoppingList.push({ name: newItem, done: false });
    renderShoppingList();
    document.getElementById("newShoppingItem").value = '';
  }
}

function toggleItem(index) {
  shoppingList[index].done = !shoppingList[index].done;
  renderShoppingList();
}

function deleteItem(index) {
  shoppingList.splice(index, 1);
  renderShoppingList();
}

renderShoppingList(); // Initial render of the shopping list
<script>
// Load saved meals from localStorage
function loadMeals() {
  const savedMeals = JSON.parse(localStorage.getItem('mealPlan')) || {};

  document.querySelectorAll('.meal').forEach(meal => {
    const day = meal.dataset.day;
    if (savedMeals[day]) {
      meal.innerText = savedMeals[day];
    }
  });
}

// Save changes made to meals into localStorage
function saveMeals() {
  const meals = {};
  document.querySelectorAll('.meal').forEach(meal => {
    const day = meal.dataset.day;
    meals[day] = meal.innerText;
  });
  localStorage.setItem('mealPlan', JSON.stringify(meals));
}

// Automatically save meals whenever edited
document.querySelectorAll('.meal').forEach(meal => {
  meal.addEventListener('blur', saveMeals); // Save on blur (when focus leaves the element)
});

// Load saved meals on page load
loadMeals();
</script>
</body>
</html>
