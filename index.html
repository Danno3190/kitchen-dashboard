<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:-apple-system, Arial;
color:white;
background:url("https://images.unsplash.com/photo-1504754524776-8f4f37790ca0") center/cover no-repeat;
height:100vh;
}

.overlay{
background:rgba(0,0,0,0.55);
height:100%;
padding:30px;
}

.clock{
font-size:70px;
font-weight:600;
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:25px;
}

.card{
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:25px;
}

h2{
font-size:40px;
margin-top:0;
}

.item{
font-size:28px;
margin:10px 0;
}

.weather{
font-size:50px;
}

input[type=checkbox]{
transform:scale(1.5);
margin-right:10px;
}

</style>

</head>

<body>

<div class="overlay">

<div id="clock" class="clock"></div>

<div class="grid">

<div class="card">

<h2>Calendar</h2>

<ul id="calendar"></ul>

</div>


<div class="card">
<h2>Shopping</h2>

<ul id="shoppingList"></ul>

<div style="margin-top:10px">
<input id="newItem" placeholder="Add item..." style="width:65%;padding:8px;border-radius:8px;border:none">

<button onclick="addItem()" style="padding:8px 12px;border:none;border-radius:8px;">Add</button>
</div>

</div>


<div class="card">

<h2>Meal Plan</h2>

<div contenteditable="true" class="item">Mon – Pasta</div>
<div contenteditable="true" class="item">Tue – Tacos</div>
<div contenteditable="true" class="item">Wed – Curry</div>
<div contenteditable="true" class="item">Thu – Stir Fry</div>
<div contenteditable="true" class="item">Fri – Pizza</div>

</div>


<div class="card">

<h2>Weather</h2>

<div id="weatherTemp" class="weather"></div>
<div id="weatherDesc" class="item"></div>

</div>

</div>

</div>


<script>

function updateClock(){
const now = new Date();
document.getElementById("clock").innerText =
now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

setInterval(updateClock,1000);
updateClock();

</script>


<script>

fetch("https://wttr.in/Gateshead?format=j1")
.then(r=>r.json())
.then(data=>{

document.getElementById("weatherTemp").innerText =
data.current_condition[0].temp_C + "°C";

document.getElementById("weatherDesc").innerText =
data.current_condition[0].weatherDesc[0].value;

});

</script>


<script>

const url="https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";

fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url))
.then(r=>r.text())
.then(data=>{

const events=data.split("BEGIN:VEVENT");
const list=document.getElementById("calendar");

let futureEvents=[];

events.forEach(event=>{

let title=event.match(/SUMMARY:(.*)/);
let date=event.match(/DTSTART[^:]*:(.*)/);

if(!title||!date) return;

const raw=date[1].trim();

const year=raw.substring(0,4);
const month=raw.substring(4,6);
const day=raw.substring(6,8);

const eventDate=new Date(year,month-1,day);

if(eventDate < new Date().setHours(0,0,0,0)) return;

futureEvents.push({
date:eventDate,
title:title[1],
display:day+"/"+month+" - "+title[1]
});

});

futureEvents.sort((a,b)=>a.date-b.date);

futureEvents.slice(0,5).forEach(event=>{

let item=document.createElement("li");
item.style.fontSize="28px";
item.style.margin="10px 0";

item.innerText=event.display;

list.appendChild(item);

});

});

</script>


<script>

setTimeout(()=>{
location.reload();
},300000);

</script>

  <script>

let shopping = JSON.parse(localStorage.getItem("shopping")) || [
{name:"Milk",done:false},
{name:"Eggs",done:false},
{name:"Bread",done:false}
];

function renderList(){

const list=document.getElementById("shoppingList");
list.innerHTML="";

shopping
.sort((a,b)=>a.done-b.done)
.forEach((item,i)=>{

let li=document.createElement("li");

li.style.fontSize="24px";
li.style.margin="8px 0";
li.style.cursor="pointer";

li.innerHTML = `
<input type="checkbox" ${item.done ? "checked":""} onclick="toggleItem(${i})">

<span style="${item.done ? "text-decoration:line-through;opacity:0.6":""}">
${item.name}
</span>

<button onclick="deleteItem(${i})" style="margin-left:10px;border:none;background:none;color:#ff6b6b;font-size:20px;cursor:pointer">
❌
</button>
`;

list.appendChild(li);

});

localStorage.setItem("shopping",JSON.stringify(shopping));

}

function addItem(){

const input=document.getElementById("newItem");

if(input.value.trim()=="") return;

shopping.push({name:input.value,done:false});

input.value="";

renderList();

}

function toggleItem(i){

shopping[i].done = !shopping[i].done;

renderList();

}
    function deleteItem(i){

shopping.splice(i,1);

renderList();

}

renderList();

</script>
</body>
</html>
