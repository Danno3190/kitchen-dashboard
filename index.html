<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-image: url('https://drive.google.com/uc?export=view&id=1RsXL8T3P_I5lmLClzoN81qY1Rq8cpfmU'); /* Use the updated Google Drive link */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Heading section style */
    #heading {
      text-align: center;
      margin-bottom: 20px;
    }

    #dateTime {
      font-size: 18px;
      margin-top: 10px;
    }

    /* Grid for layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    /* Card for each section */
    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    /* Meal Plan */
    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    .todayMeal {
      background-color: rgba(255, 255, 255, 0.3); 
      padding: 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* Weather */
    #weatherTemp {
      font-size: 18px;
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px;
    }

    /* Calendar */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }

    /* Shopping List */
    #shoppingList {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #shoppingList li {
      background-color: rgba(0, 0, 0, 0.5);
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }

    .shoppingItem {
      flex: 1;
    }

    .deleteButton {
      background-color: red;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 5px;
    }

    .deleteButton:hover {
      background-color: darkred;
    }

    .checkbox {
      margin-right: 10px;
    }

    /* Header */
    #heading h1 {
      font-size: 36px;
      margin: 0;
    }

    #heading h2 {
      font-size: 24px;
      margin: 0;
    }

    /* Responsive Design for iPad Mini */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr; /* Single column layout for smaller screens */
      }

      #heading h1 {
        font-size: 28px;
      }

      #heading h2 {
        font-size: 18px;
      }

      .card {
        padding: 15px;
      }

      .meal {
        font-size: 18px;
      }

      #weatherTemp {
        font-size: 16px;
      }

      #weatherDesc {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Heading Section -->
  <div id="heading">
    <h1>The Grey's Kitchen</h1>
    <h2 id="dateTime"></h2>
  </div>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Mams</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Dinner</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Burgers</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Mams</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Dinner</div>
      </div>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather in Gateshead</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
      <div id="forecast"></div> <!-- Additional weather forecast info -->
    </div>
  </div>

  <script>
    // Date and Time (12-hour format)
    function updateDateTime() {
      const date = new Date();
      const hours = date.getHours();
      const minutes = date.getMinutes().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const hours12 = hours % 12;
      const displayHours = hours12 ? hours12 : 12;  // Show 12 for 0 hours (midnight)
      const dateTime = `${date.toLocaleString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} at ${displayHours}:${minutes} ${ampm}`;
      document.getElementById("dateTime").textContent = dateTime;
    }
    setInterval(updateDateTime, 1000); // Update every second
    updateDateTime(); // Initial call to set date/time

    // Weather Data Fetching using OpenWeatherMap API
    const apiKey = "4ec41d838017d2a6134282b6ff58ad42";  // Replace with your OpenWeatherMap API Key
    const city = "Gateshead";  // Replace with your desired city
    const units = "metric";  // For temperature in Celsius

    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=${units}&appid=${apiKey}`)
      .then(response => response.json())
      .then(data => {
        if (data && data.main && data.weather) {
          const temp = data.main.temp;  // Temperature in Celsius
          const weatherDesc = data.weather[0].description;  // Weather description

          document.getElementById("weatherTemp").textContent = `${temp}°C`;
          document.getElementById("weatherDesc").textContent = weatherDesc;
        } else {
          document.getElementById("weatherTemp").textContent = "Weather not available";
          document.getElementById("weatherDesc").textContent = "";
        }
      })
      .catch(error => {
        console.error("Error fetching weather data:", error);
        document.getElementById("weatherTemp").textContent = "Weather not available";
        document.getElementById("weatherDesc").textContent = "";
      });
  </script>

  <script>
    // Calendar Fetch Logic
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";  // Replace with your iCloud calendar URL

    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
      .then(response => response.text())
      .then(data => {
        const events = data.split("BEGIN:VEVENT");
        const list = document.getElementById("calendar");
        list.innerHTML = '';  // Clear current events

        let count = 0;  // Track number of events displayed
        const today = new Date();  // Get today's date
        const currentDate = today.toISOString().split("T")[0];  // Format as YYYY-MM-DD

        const eventArray = [];

        // Parse each event and add it to an array
        events.forEach(event => {
          const title = event.match(/SUMMARY:(.*)/);
          const date = event.match(/DTSTART[^:]*:(.*)/);
          if (!title || !date) return;

          const raw = date[1].trim();
          const year = raw.substring(0, 4);
          const month = raw.substring(4, 6);
          const day = raw.substring(6, 8);
          const eventDate = `${year}-${month}-${day}`;

          if (eventDate >= currentDate) {  // Only show upcoming events
            eventArray.push({
              date: eventDate,
              title: title[1]
            });
          }
        });

        // Sort the events by date
        eventArray.sort((a, b) => (a.date > b.date) ? 1 : -1);

        // Display up to 5 events
        eventArray.slice(0, 5).forEach(event => {
          const item = document.createElement("li");
          item.textContent = `${event.date.split("-")[2]}/${event.date.split("-")[1]} - ${event.title}`;
          list.appendChild(item);
          count++;  // Increment count after displaying an event
        });
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events.</li>";
      });
  </script>

</body>
</html>
