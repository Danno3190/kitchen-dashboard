<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Calendar</title>
</head>
<body>
  <h2>Calendar Events</h2>
  <ul id="calendar"></ul>

  <script>
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ"; // Your iCloud Calendar URL here
    
    // Test the calendar URL with a basic fetch
    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`)
      .then(response => response.text())
      .then(data => {
        const list = document.getElementById("calendar");
        const events = data.split("BEGIN:VEVENT");
        if (events.length > 1) {
          events.forEach(event => {
            const title = event.match(/SUMMARY:(.*)/);
            if (title) {
              const li = document.createElement("li");
              li.textContent = title[1];
              list.appendChild(li);
            }
          });
        } else {
          list.innerHTML = "<li>No events found.</li>";
        }
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events.</li>";
      });
  </script>
</body>
</html>
