<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Your other styles here */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: bold;
      margin: 0;
      color: #fff;
    }

    #currentDateTime {
      font-size: 20px;
      color: #fff;
      margin-top: 10px;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    /* Highlight current day */
    .todayMeal {
      background-color: rgba(255, 255, 255, 0.3);  /* Light highlight */
      padding: 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    #weatherTemp {
      font-size: 18px;
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px;
    }

    /* Calendar CSS */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }

    /* Responsive styles */
    @media screen and (max-width: 768px) {
      .header h1 {
        font-size: 30px;
      }

      #currentDateTime {
        font-size: 16px;
      }

      .grid {
        grid-template-columns: 1fr; /* One column for smaller screens */
      }
    }
  </style>
</head>
<body>

  <!-- Header Section with Date/Time -->
  <div class="header">
    <h1>The Grey's Kitchen</h1>
    <div id="currentDateTime"></div>
  </div>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Mams</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Dinner</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Burgers</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Mams</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Dinner</div>
      </div>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <script>
    // Update Date/Time every second
    function updateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true };
      const dateStr = now.toLocaleDateString(undefined, options);
      const timeStr = now.toLocaleTimeString();
      document.getElementById("currentDateTime").innerHTML = `${dateStr} - ${timeStr}`;
    }

    // Update every second
    setInterval(updateTime, 1000);
    updateTime(); // Initial call to display time immediately
  </script>

  <!-- Your existing scripts for calendar, meal plan, shopping list, and weather will follow here... -->

</body>
</html>
