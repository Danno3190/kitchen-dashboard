<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Dashboard</title>
<style>
  body {
    background-color: #2f2f2f;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }
  #heading {
    text-align: center;
    margin-bottom: 20px;
  }
  #dateTime {
    font-size: 18px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .card {
    background-color: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
  }
  h2 { font-size: 24px; margin-bottom: 10px; }
  #calendar { list-style: none; padding: 0; }
  #calendar li {
    margin: 10px 0;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div id="heading">
  <h1>The Grey's Kitchen</h1>
  <h2 id="dateTime"></h2>
</div>

<div class="grid">
  <div class="card">
    <h2>Calendar</h2>
    <ul id="calendar"></ul>
  </div>

  <div class="card">
    <h2>Weather in Gateshead</h2>
    <div id="weatherCurrent"></div>
    <div id="weatherForecast"></div>
  </div>
</div>

<script>
  // Clock
  function updateDateTime() {
    const d = new Date();
    const hrs = d.getHours();
    const mins = d.getMinutes().toString().padStart(2,'0');
    const ampm = hrs >= 12 ? 'PM':'AM';
    const hrs12 = hrs % 12 || 12;
    document.getElementById("dateTime").textContent =
      `${d.toLocaleString('en-GB',{weekday:'long', month:'long', day:'numeric'})} ${hrs12}:${mins} ${ampm}`;
  }
  setInterval(updateDateTime, 1000);
  updateDateTime();
</script>

<script>
  // Calendar
  const calendarURL = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";

  fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(calendarURL))
    .then(r=>r.text())
    .then(data => {
      const events = data.split("BEGIN:VEVENT");
      const list = document.getElementById("calendar");
      list.innerHTML = "";
      const today = new Date().toISOString().split("T")[0];
      let arr = [];
      events.forEach(ev => {
        const t = ev.match(/SUMMARY:(.*)/);
        const d = ev.match(/DTSTART[^:]*:(.*)/);
        if(t && d) {
          const raw = d[1].trim();
          const y=raw.substr(0,4), m=raw.substr(4,2), day=raw.substr(6,2);
          const date = `${y}-${m}-${day}`;
          if(date >= today) arr.push({date, title:t[1]});
        }
      });
      arr.sort((a,b)=>(a.date>b.date?1:-1));
      arr.slice(0,5).forEach(ev => {
        const li = document.createElement("li");
        li.textContent = `${ev.date.split("-")[2]}/${ev.date.split("-")[1]} - ${ev.title}`;
        list.appendChild(li);
      });
    })
    .catch(() => {
      document.getElementById("calendar").innerHTML="<li>Unable to load events.</li>";
    });
</script>

<script>
  // Weather (Current + Forecast)
  const weatherKey = "4ec41d838017d2a6134282b6ff58ad42";
  const city="Gateshead";
  fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${weatherKey}`)
    .then(r=>r.json())
    .then(data => {
      document.getElementById("weatherCurrent").innerHTML =
        `<strong>Now:</strong> ${data.main.temp}°C, ${data.weather[0].description}`;
    });

  fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${weatherKey}`)
    .then(r=>r.json())
    .then(data => {
      const list = data.list;
      let output="";
      for(let i=0;i<list.length;i+=8) { // every 8th item ≈ next day
        const d = new Date(list[i].dt * 1000);
        const hrs = d.getHours();
        const ampm = hrs>=12?'PM':'AM';
        const h12 = hrs%12||12;
        output += `<div>${d.toLocaleDateString('en-GB',{weekday:'short'})} ${h12}:${d.getMinutes().toString().padStart(2,'0')} ${ampm} - ${list[i].main.temp}°C ${list[i].weather[0].description}</div>`;
      }
      document.getElementById("weatherForecast").innerHTML=output;
    })
    .catch(()=>{
      document.getElementById("weatherForecast").textContent="Forecast unavailable";
    });
</script>

</body>
</html>
