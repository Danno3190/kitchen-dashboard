<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Overall Styles */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-image: url('https://drive.google.com/file/d/1RsXL8T3P_I5lmLClzoN81qY1Rq8cpfmU/view?usp=drivesdk'); /* Add your background image URL here */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    /* Meal Plan */
    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    .todayMeal {
      background-color: rgba(255, 255, 255, 0.3); 
      padding: 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* Weather */
    #weatherTemp {
      font-size: 18px;
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px;
    }

    #weatherLocation {
      font-size: 16px;
      margin-bottom: 5px;
    }

    /* Calendar */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }

    /* Shopping List */
    #shoppingList {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #shoppingList li {
      background-color: rgba(0, 0, 0, 0.5);
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }

    .shoppingItem {
      flex: 1;
    }

    .deleteButton {
      background-color: red;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 5px;
    }

    .deleteButton:hover {
      background-color: darkred;
    }

    .checkbox {
      margin-right: 10px;
    }

    /* Header */
    #heading {
      text-align: center;
      margin-bottom: 20px;
    }

    #heading h1 {
      font-size: 36px;
      margin: 0;
    }

    #heading h2 {
      font-size: 24px;
      margin: 0;
    }

    /* Responsive Design for iPad Mini */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr; /* Single column layout for smaller screens */
      }

      #heading h1 {
        font-size: 28px;
      }

      #heading h2 {
        font-size: 18px;
      }

      .card {
        padding: 15px;
      }

      .meal {
        font-size: 18px;
      }

      #weatherTemp {
        font-size: 16px;
      }

      #weatherDesc {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div id="heading">
    <h1>The Grey's Kitchen</h1>
    <h2 id="dateTime"></h2>
  </div>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Mams</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Dinner</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Burgers</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Mams</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Dinner</div>
      </div>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherLocation">Weather in Gateshead</div>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <script>
    // Date and Time (24hr format)
    function updateDateTime() {
      const date = new Date();
      const dateTime = `${date.toLocaleString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} at ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
      document.getElementById("dateTime").textContent = dateTime;
    }
    setInterval(updateDateTime, 1000); // Update every second
    updateDateTime(); // Initial call to set date/time

    // Meal Plan Saving and Loading
    function loadMeals() {
      const savedMeals = JSON.parse(localStorage.getItem('mealPlan')) || {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        if (savedMeals[day]) {
          meal.innerText = savedMeals[day];
        }
      });
    }

    function saveMeals() {
      const meals = {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        meals[day] = meal.innerText;
      });
      localStorage.setItem('mealPlan', JSON.stringify(meals));
    }

    document.querySelectorAll('.meal').forEach(meal => {
      meal.addEventListener('blur', saveMeals);
    });

    loadMeals();  // Load meals when the page is opened

    // Highlight current day in meal plan
    const today = new Date().getDay();  // Get the current day (0 = Sunday, 1 = Monday, etc.)

    document.querySelectorAll('.meal').forEach(meal => {
      if (parseInt(meal.dataset.day) === today) {
        meal.classList.add('todayMeal');  // Add class to highlight the current day
      }
    });
  </script>

  <script>
    // Shopping List Logic
    let shoppingList = JSON.parse(localStorage.getItem("shoppingList")) || [];

    function renderShoppingList() {
      const list = document.getElementById("shoppingList");
      list.innerHTML = '';
      shoppingList.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<input type="checkbox" ${item.done ? "checked" : ""} onclick="toggleItem(${index})"> ${item.name} 
        <button onclick="deleteItem(${index})" style="margin-left: 10px; background-color: red; color: white;">❌</button>`;
        list.appendChild(li);
      });

      localStorage.setItem("shoppingList", JSON.stringify(shoppingList));
    }

    function addShoppingItem() {
      const newItem = document.getElementById("newShoppingItem").value;
      if (newItem.trim()) {
        shoppingList.push({ name: newItem, done: false });
        renderShoppingList();
        document.getElementById("newShoppingItem").value = '';
      }
    }

    function toggleItem(index) {
      shoppingList[index].done = !shoppingList[index].done;
      renderShoppingList();
    }

    function deleteItem(index) {
      shoppingList.splice(index, 1);
      renderShoppingList();
    }

    renderShoppingList();  // Initial render of the shopping list
  </script>

  <script>
    // Calendar Fetch Logic
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";  // Replace with your iCloud calendar URL

    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
      .then(response => response.text())
      .then(data => {
        const events = data.split("BEGIN:VEVENT");
        const list = document.getElementById("calendar");
        list.innerHTML = '';  // Clear current events

        let count = 0;  // Track number of events displayed
        const today = new Date();  // Get today's date
        const currentDate = today.toISOString().split("T")[0];  // Format as YYYY-MM-DD

        const eventArray = [];

        // Parse each event and add it to an array
        events.forEach(event => {
          const title = event.match(/SUMMARY:(.*)/);
          const date = event.match(/DTSTART[^:]*:(.*)/);
          if (!title || !date) return;

          const raw = date[1].trim();
          const year = raw.substring(0, 4);
          const month = raw.substring(4, 6);
          const day = raw.substring(6, 8);
          const eventDate = `${year}-${month}-${day}`;

          if (eventDate >= currentDate) {  // Only show upcoming events
            eventArray.push({
              date: eventDate,
              title: title[1]
            });
          }
        });

        // Sort the events by date
        eventArray.sort((a, b) => (a.date > b.date) ? 1 : -1);

        // Display up to 5 events
        eventArray.slice(0, 5).forEach(event => {
          const item = document.createElement("li");
          item.textContent = `${event.date.split("-")[2]}/${event.date.split("-")[1]} - ${event.title}`;
          list.appendChild(item);
          count++;  // Increment count after displaying an event
        });
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events.</li>";
      });
  </script>

</body>
</html>
