<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
</head>
<body>

  <h2>Calendar Events</h2>
  <ul id="calendar"></ul>

  <script>
    // Replace with your iCloud Calendar URL
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";  // Replace with the iCloud calendar URL

    fetch(url)
      .then(response => response.text())
      .then(data => {
        const list = document.getElementById("calendar");
        const events = data.split("BEGIN:VEVENT");
        
        if (events.length > 1) {
          events.forEach(event => {
            const title = event.match(/SUMMARY:(.*)/);
            const date = event.match(/DTSTART[^:]*:(.*)/);

            if (title && date) {
              const li = document.createElement("li");
              const raw = date[1].trim();
              const year = raw.substring(0, 4);
              const month = raw.substring(4, 6);
              const day = raw.substring(6, 8);
              const eventDate = `${year}-${month}-${day}`;
              li.textContent = `${eventDate} - ${title[1]}`;
              list.appendChild(li);
            }
          });
        } else {
          list.innerHTML = "<li>No events found.</li>";
        }
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events.</li>";
      });
  </script>

</body>
</html>
