<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Your other styles here */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    /* Highlight current day */
    .todayMeal {
      background-color: rgba(255, 255, 255, 0.3);  /* Light highlight */
      padding: 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    #weatherTemp {
      font-size: 18px;
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px;
    }

    /* Calendar CSS */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Mams</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Dinner</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Burgers</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Mams</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Dinner</div>
      </div>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <!-- Commented out the JavaScript temporarily for troubleshooting -->
  <script>
    // Meal Plan Saving and Loading
    function loadMeals() {
      const savedMeals = JSON.parse(localStorage.getItem('mealPlan')) || {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        if (savedMeals[day]) {
          meal.innerText = savedMeals[day];
        }
      });
    }

    function saveMeals() {
      const meals = {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        meals[day] = meal.innerText;
      });
      localStorage.setItem('mealPlan', JSON.stringify(meals));
    }

    document.querySelectorAll('.meal').forEach(meal => {
      meal.addEventListener('blur', saveMeals);
    });

    loadMeals();  // Load meals when the page is opened

    // Highlight current day in meal plan
    const today = new Date().getDay();  // Get the current day (0 = Sunday, 1 = Monday, etc.)

    document.querySelectorAll('.meal').forEach(meal => {
      if (parseInt(meal.dataset.day) === today) {
        meal.classList.add('todayMeal');  // Add class to highlight the current day
      }
    });
  </script>

  <script>
    // Shopping List Logic
    let shoppingList = JSON.parse(localStorage.getItem("shoppingList")) || [];

    function renderShoppingList() {
      const list = document.getElementById("shoppingList");
      list.innerHTML = '';
      shoppingList.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<input type="checkbox" ${item.done ? "checked" : ""} onclick="toggleItem(${index})"> ${item.name} 
        <button onclick="deleteItem(${index})" style="margin-left: 10px; background-color: red; color: white;">❌</button>`;
        list.appendChild(li);
      });

      localStorage.setItem("shoppingList", JSON.stringify(shoppingList));
    }

    function addShoppingItem() {
      const newItem = document.getElementById("newShoppingItem").value;
      if (newItem.trim()) {
        shoppingList.push({ name: newItem, done: false });
        renderShoppingList();
        document.getElementById("newShoppingItem").value = '';
      }
    }

    function toggleItem(index) {
      shoppingList[index].done = !shoppingList[index].done;
      renderShoppingList();
    }

    function deleteItem(index) {
      shoppingList.splice(index, 1);
      renderShoppingList();
    }

    renderShoppingList();  // Initial render of the shopping list
  </script>

  <script>
const url = "YOUR_ICALENDAR_URL";  // Replace with your iCloud calendar URL

// Fetch the iCalendar data using the AllOrigins proxy to bypass CORS
fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
  .then(response => response.text())  // Process the response as text
  .then(data => {
    // Split the data into individual events
    const events = data.split("BEGIN:VEVENT");
    const list = document.createElement("ul");  // Create a list element
    document.body.appendChild(list);  // Append the list to the page

    let count = 0;  // Track number of events displayed
    const today = new Date();  // Get today's date
    const currentDate = today.toISOString().split("T")[0];  // Format today's date as YYYY-MM-DD

    const eventArray = [];  // Store parsed events here

    // Loop through each event in the calendar data
    events.forEach(event => {
      const title = event.match(/SUMMARY:(.*)/);  // Extract the event title
      const date = event.match(/DTSTART[^:]*:(.*)/);  // Extract the event start date

      if (!title || !date) return;  // Skip events that don't have a title or date

      const raw = date[1].trim();
      const month = raw.substring(4, 6);  // Get the month part of the date
      const day = raw.substring(6, 8);    // Get the day part of the date
      const eventDate = `${raw.substring(0, 4)}-${month}-${day}`; // Format the event date as YYYY-MM-DD

      // Only display upcoming events that are from today or later
      if (eventDate >= currentDate) {
        eventArray.push({ date: eventDate, title: title[1] });  // Store the event in the array
        count++;  // Increment the count after displaying an event
      }
    });

    // Sort events by date (ascending order)
    eventArray.sort((a, b) => new Date(a.date) - new Date(b.date));

    // Display the sorted events (only 5)
    eventArray.slice(0, 5).forEach(event => {
      const item = document.createElement("li");
      item.textContent = `${event.date} - ${event.title}`;  // Show event date and title
      list.appendChild(item);  // Append the event to the list
    });
  })
  .catch(error => {
    console.error("Error fetching calendar events:", error);  // Log any errors to the console
    const list = document.createElement("ul");
    list.innerHTML = "<li>Unable to load events.</li>";  // Display a fallback message if the events can't be loaded
    document.body.appendChild(list);  // Append the list to the page
  });
  </script>

  <script>
    // Weather Data Fetching
    fetch("https://wttr.in/Gateshead?format=j1")
      .then(response => response.json())
      .then(data => {
        document.getElementById("weatherTemp").textContent = `${data.current_condition[0].temp_C}°C`;
        document.getElementById("weatherDesc").textContent = data.current_condition[0].weatherDesc[0].value;
      });
  </script>

</body>
</html>
