<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
font-family:-apple-system, Arial;
color:white;
background:url("https://images.unsplash.com/photo-1504754524776-8f4f37790ca0") center/cover;
}

.overlay{
background:rgba(0,0,0,0.55);
height:100vh;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:30px;
}

.card{
background:rgba(0,0,0,0.5);
padding:25px;
border-radius:20px;
}

h2{
font-size:40px;
margin-top:0;
}

.item{
font-size:30px;
margin:10px 0;
}

.weather{
font-size:50px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="grid">

<div class="card">
<h2>Calendar</h2>

<ul id="calendar"></ul>

</div>

<div class="card">
<h2>Shopping</h2>

<div class="item">□ Milk</div>
<div class="item">□ Eggs</div>
<div class="item">□ Bread</div>

</div>

<div class="card">
<h2>Meal Plan</h2>

<div class="item">Mon – Pasta</div>
<div class="item">Tue – Tacos</div>
<div class="item">Wed – Curry</div>

</div>

<div class="card">
<h2>Weather</h2>

<div id="weatherTemp" class="weather"></div>
<div id="weatherDesc" class="item"></div>

</div>

</div>

</div>

</body>
  
<script>

const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";

fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
.then(r => r.text())
.then(data => {

const events = data.split("BEGIN:VEVENT");
const list = document.getElementById("calendar");

events.forEach(event => {

let title = event.match(/SUMMARY:(.*)/);
let date = event.match(/DTSTART.*:(.*)/);

if(title && date){

let item = document.createElement("li");
item.style.fontSize="28px";
item.style.margin="10px 0";

const raw = date[1].trim();

const year = raw.substring(0,4);
const month = raw.substring(4,6);
const day = raw.substring(6,8);

const eventDate = new Date(year, month-1, day);
const today = new Date();

if(eventDate < today) return;

item.innerText = day + "/" + month + " - " + title[1];

if(list.children.length >= 5) return;

list.appendChild(item);

list.appendChild(item);

  if(list.children.length >= 5) return;

}

});

});

</div>

<script>

/* CALENDAR SCRIPT */

</script>

<script>

/* WEATHER SCRIPT */

fetch("https://wttr.in/Gateshead?format=j1")
.then(response => response.json())
.then(data => {

document.getElementById("weatherTemp").innerText =
data.current_condition[0].temp_C + "°C";

document.getElementById("weatherDesc").innerText =
data.current_condition[0].weatherDesc[0].value;

});

</script>

</body>
</html>
