<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Your other styles here */
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    /* Highlight current day */
    .todayMeal {
      background-color: rgba(255, 255, 255, 0.3);  /* Light highlight */
      padding: 6px;
      border-radius: 10px;
      font-weight: bold;
    }

    #weatherTemp {
      font-size: 18px;
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px;
    }

    /* Calendar CSS */
    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="grid">
    <!-- Header Section -->
    <div class="card">
      <h2 id="header">The Grey's Kitchen</h2>
      <div id="currentTime"></div>
    </div>

    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Mams</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Dinner</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Burgers</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Mams</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Dinner</div>
      </div>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <script>
    // Meal Plan Logic (same as before)
    // Shopping List Logic (same as before)
    // Weather Data Fetch Logic (same as before)
    
    // Calendar Fetch Logic (same as before)
    
    // Date and Time Logic (24-hour format)
    const currentDate = new Date();
    const options = {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    };
    document.getElementById("currentTime").textContent = currentDate.toLocaleString('en-US', options);
  </script>

</body>
</html>
