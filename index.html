<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    body {
      background-color: #2f2f2f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .meal {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    .todayMeal {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 6px;
      border-radius: 10px;
    }

    #weatherTemp {
      font-size: 18px; /* Smaller font size */
      font-weight: bold;
    }

    #weatherDesc {
      font-size: 14px; /* Smaller font size */
    }
  </style>
</head>
<body>

  <div class="grid">
    <!-- Calendar Section -->
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>

    <!-- Shopping List Section -->
    <div class="card">
      <h2>Shopping List</h2>
      <ul id="shoppingList"></ul>
      <input id="newShoppingItem" placeholder="Add Item" style="width: 80%; padding: 8px;">
      <button onclick="addShoppingItem()">Add</button>
    </div>

    <!-- Meal Plan Section -->
    <div class="card">
      <h2>Meal Plan</h2>
      <div id="meals">
        <div data-day="1" contenteditable="true" class="meal">Mon – Pasta</div>
        <div data-day="2" contenteditable="true" class="meal">Tue – Tacos</div>
        <div data-day="3" contenteditable="true" class="meal">Wed – Curry</div>
        <div data-day="4" contenteditable="true" class="meal">Thu – Stir Fry</div>
        <div data-day="5" contenteditable="true" class="meal">Fri – Pizza</div>
        <div data-day="6" contenteditable="true" class="meal">Sat – Takeaway</div>
        <div data-day="0" contenteditable="true" class="meal">Sun – Roast</div>
      </div>
    </div>

    <!-- Weather Section -->
    <div class="card">
      <h2>Weather</h2>
      <div id="weatherTemp"></div>
      <div id="weatherDesc"></div>
    </div>
  </div>

  <script>
    // Calendar Script
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";  // Replace with your iCloud Calendar URL
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url))
      .then(response => response.text())
      .then(data => {
        const events = data.split("BEGIN:VEVENT");
        const list = document.getElementById("calendar");
        list.innerHTML = '';
        events.forEach(event => {
          let title = event.match(/SUMMARY:(.*)/);
          let date = event.match(/DTSTART[^:]*:(.*)/);
          if (!title || !date) return;
          const raw = date[1].trim();
          const year = raw.substring(0, 4);
          const month = raw.substring(4, 6);
          const day = raw.substring(6, 8);
          const item = document.createElement("li");
          item.textContent = `${day}/${month} - ${title[1]}`;
          list.appendChild(item);
        });
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        document.getElementById("calendar").innerHTML = "<li>Unable to load events.</li>";
      });

    // Meal Plan Script
    function loadMeals() {
      const savedMeals = JSON.parse(localStorage.getItem('mealPlan')) || {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        if (savedMeals[day]) {
          meal.innerText = savedMeals[day];
        }
      });
    }
    function saveMeals() {
      const meals = {};
      document.querySelectorAll('.meal').forEach(meal => {
        const day = meal.dataset.day;
        meals[day] = meal.innerText;
      });
      localStorage.setItem('mealPlan', JSON.stringify(meals));
    }
    document.querySelectorAll('.meal').forEach(meal => {
      meal.addEventListener('blur', saveMeals);
    });
    loadMeals(); 

    // Weather Script
    fetch("https://wttr.in/Gateshead?format=j1")
      .then(response => response.json())
      .then(data => {
        document.getElementById("weatherTemp").textContent = `${data.current_condition[0].temp_C}°C`;
        document.getElementById("weatherDesc").textContent = data.current_condition[0].weatherDesc[0].value;
      });
  </script>
</body>
</html>
