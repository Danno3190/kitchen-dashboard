<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    /* Simple CSS for layout */
    body {
      font-family: Arial, sans-serif;
      background-color: #333;
      color: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
    }
    .card {
      background-color: #222;
      padding: 20px;
      margin: 10px;
      border-radius: 5px;
      width: 250px;
    }
    h2 {
      margin-top: 0;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 5px 0;
    }
    .todayMeal {
      background-color: #4CAF50; /* Highlight today's meal */
    }
    input {
      margin-top: 10px;
      padding: 5px;
      width: 200px;
    }
    button {
      padding: 5px;
      background-color: #4CAF50;
      border: none;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Calendar</h2>
    <ul id="calendar"></ul>
  </div>

  <div class="card">
    <h2>Meal Plan</h2>
    <ul id="mealPlan">
      <li data-day="0">Mon - Pasta</li>
      <li data-day="1">Tue - Mams</li>
      <li data-day="2">Wed - Dinner</li>
      <li data-day="3">Thu - Burgers</li>
      <li data-day="4">Fri - Pizza</li>
      <li data-day="5">Sat - Mams</li>
      <li data-day="6">Sun - Dinner</li>
    </ul>
  </div>

  <div class="card">
    <h2>Shopping List</h2>
    <input type="text" id="newShoppingItem" placeholder="Add Item">
    <button onclick="addShoppingItem()">Add</button>
    <ul id="shoppingList"></ul>
  </div>

  <div class="card">
    <h2>Weather</h2>
    <div id="weatherTemp">Loading...</div>
    <div id="weatherDesc">Loading...</div>
  </div>

  <script>
    // Sample JavaScript for Meal Plan, Shopping List, and Weather
    const today = new Date().getDay();
    document.querySelectorAll('.meal').forEach(meal => {
      if (parseInt(meal.dataset.day) === today) {
        meal.classList.add('todayMeal');
      }
    });

    // Shopping List logic
    let shoppingList = JSON.parse(localStorage.getItem("shoppingList")) || [];
    const shoppingListElement = document.getElementById("shoppingList");

    function renderShoppingList() {
      shoppingListElement.innerHTML = "";
      shoppingList.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${item.name} <button onclick="deleteItem(${index})">Delete</button>`;
        shoppingListElement.appendChild(li);
      });
      localStorage.setItem("shoppingList", JSON.stringify(shoppingList));
    }

    function addShoppingItem() {
      const newItem = document.getElementById("newShoppingItem").value;
      if (newItem.trim()) {
        shoppingList.push({ name: newItem, done: false });
        renderShoppingList();
      }
      document.getElementById("newShoppingItem").value = "";
    }

    function deleteItem(index) {
      shoppingList.splice(index, 1);
      renderShoppingList();
    }

    renderShoppingList();

    // Weather API (add actual weather API code here)
    fetch("https://wttr.in/?format=j1")
      .then(r => r.json())
      .then(data => {
        document.getElementById("weatherTemp").textContent = `${data.current_condition[0].temp_C}°C`;
        document.getElementById("weatherDesc").textContent = data.current_condition[0].weatherDesc[0].value;
      })
      .catch(() => {
        document.getElementById("weatherTemp").textContent = "Weather not available";
        document.getElementById("weatherDesc").textContent = "";
      });

    // Calendar (Test URL)
    const calendarUrl = "https://www.google.com/calendar/ical/your-calendar-id/basic.ics";  // Use actual calendar URL
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(calendarUrl))
      .then(response => response.text())
      .then(data => {
        const events = data.split("BEGIN:VEVENT");
        const calendarList = document.getElementById("calendar");

        events.forEach(event => {
          const title = event.match(/SUMMARY:(.*)/);
          const date = event.match(/DTSTART[^:]*:(.*)/);
          if (title && date) {
            const raw = date[1].trim();
            const eventDate = `${raw.substring(0, 4)}-${raw.substring(4, 6)}-${raw.substring(6, 8)}`;
            const li = document.createElement("li");
            li.textContent = `${eventDate} - ${title[1]}`;
            calendarList.appendChild(li);
          }
        });
      })
      .catch(() => {
        const calendarList = document.getElementById("calendar");
        calendarList.innerHTML = "<li>Unable to load events.</li>";
      });
  </script>
</body>
</html>
