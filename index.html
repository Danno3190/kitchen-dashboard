<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <style>
    body {
      background-color: #d3d3d3;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    #heading {
      text-align: center;
      margin-bottom: 20px;
      color: black;
    }

    #dateTime {
      font-size: 18px;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    #calendar {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #calendar li {
      margin: 10px 0;
      font-size: 16px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="heading">
    <h1>The Grey's Kitchen</h1>
    <h2 id="dateTime"></h2>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Calendar</h2>
      <ul id="calendar"></ul>
    </div>
  </div>

  <script>
    // Date and Time (12-hour format with AM/PM)
    function updateDateTime() {
      const date = new Date();
      const options = { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
        hour: 'numeric', minute: 'numeric', hour12: true  
      };
      const dateTime = date.toLocaleString('en-GB', options);
      document.getElementById("dateTime").textContent = dateTime;
    }
    setInterval(updateDateTime, 1000); // Update every second
    updateDateTime(); // Initial call to set date/time

    // Calendar Fetch Logic using a CORS-enabled proxy
    const url = "https://p156-caldav.icloud.com/published/2/MTA1NzE4MjQxMjEwNTcxOICC5_ESlAX_Y24LY3sAK534rOhMOUh2k4Aih0NB0lukb420-fnm08zkAxwKdWjxTSdME9B2bnoLcv4H9sLwJNQ";  // Your iCloud public calendar link

    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`)
      .then(response => response.text())
      .then(data => {
        const events = data.split("BEGIN:VEVENT");
        const list = document.getElementById("calendar");
        list.innerHTML = '';  // Clear current events

        // Ensure there is event data
        if (events.length <= 1) {
          list.innerHTML = "<li>No events found in the calendar data.</li>";
          return;
        }

        let count = 0;
        const today = new Date();
        const currentDate = today.toISOString().split("T")[0]; // Format: YYYY-MM-DD

        const eventArray = [];

        // Parse each event and add it to the event array
        events.forEach(event => {
          const title = event.match(/SUMMARY:(.*)/);
          const date = event.match(/DTSTART[^:]*:(.*)/);
          const time = event.match(/DTSTART[^:]*:(\d{8}T\d{4})/);

          if (!title || !date || !time) return;

          const raw = date[1].trim();
          const year = raw.substring(0, 4);
          const month = raw.substring(4, 6);
          const day = raw.substring(6, 8);
          const eventDate = `${year}-${month}-${day}`;

          const eventTime = time[1].substring(8, 12);

          if (eventDate >= currentDate) {  // Only show upcoming events
            eventArray.push({
              date: eventDate,
              title: title[1],
              time: eventTime
            });
          }
        });

        // Sort events by date
        eventArray.sort((a, b) => (a.date > b.date) ? 1 : -1);

        // Display first 5 events
        eventArray.slice(0, 5).forEach(event => {
          const item = document.createElement("li");
          item.textContent = `${event.date.split("-")[2]}/${event.date.split("-")[1]} ${event.time} - ${event.title}`;
          list.appendChild(item);
          count++;
        });

        // If no events, show message
        if (count === 0) {
          list.innerHTML = "<li>No events found.</li>";
        }
      })
      .catch(error => {
        console.error("Error fetching calendar events:", error);
        const list = document.getElementById("calendar");
        list.innerHTML = "<li>Unable to load events due to an error.</li>";
      });
  </script>

</body>
</html>
